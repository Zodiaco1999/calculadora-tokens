<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
    <body>
        <div class="card">
      <div class="card-header">
        <h1>Calculadora de Tokens</h1>
        <p>Costo estimado por consumo de tokens de entrada y salida</p>
      </div>

      <div class="card-body">
        <div>
          <label for="modelo">Modelo</label>
          <select id="modelo">
            <option value="claude-haiku-4-5-20251001">claude-haiku-4-5-20251001</option>
            <option value="claude-sonnet-5">claude-sonnet-5</option>
            <option value="claude-opus-4-8">claude-opus-4-8</option>
            <option value="modelo-manual">Modelo Manual</option>
          </select>
        </div>

        <div class="price-box">
          <div class="box-title">Precio por millón de tokens (USD) — editable</div>
          <div class="row">
            <div>
              <label for="precioEntrada">Entrada ($/MTok)</label>
              <input type="number" id="precioEntrada" min="0" step="0.01">
            </div>
            <div>
              <label for="precioSalida">Salida ($/MTok)</label>
              <input type="number" id="precioSalida" min="0" step="0.01">
            </div>
          </div>
          <div class="hint">Se ajusta automáticamente al cambiar de modelo, pero puedes sobrescribirlo.</div>
        </div>

        <div class="row">
          <div>
            <label for="tokensEntrada">Tokens de entrada</label>
            <input type="number" id="tokensEntrada" min="0" step="1" placeholder="0" class="mono">
          </div>
          <div>
            <label for="tokensSalida">Tokens de salida</label>
            <input type="number" id="tokensSalida" min="0" step="1" placeholder="0" class="mono">
          </div>
        </div>

        <div class="breakdown">
          <div class="line"><span>Costo entrada</span><span id="costoEntrada" class="mono">$0.000000</span></div>
          <div class="line"><span>Costo salida</span><span id="costoSalida" class="mono">$0.000000</span></div>
        </div>
      </div>

      <div class="total">
        <span class="label">Precio final</span>
        <span class="amount mono" id="total">$0.000000</span>
      </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
